<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dealership</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Navbar styling */
        .navbar {
            margin-bottom: 50px;
            background-color: #343a40;
        }
        /* Contact Card Styling */
        .contact-container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .contact-header {
            text-align: center;
            margin-bottom: 30px;
            color: #007bff;
        }
        .info-block {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .info-icon {
            font-size: 24px;
            margin-right: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">BestCars Dealership</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/about">About</a>
            </li>
            <li class="nav-item active">
              <a class="nav-link" href="/contact">Contact Us <span class="sr-only">(current)</span></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Contact Content -->
    <div class="container">
        <div class="contact-container">
            <h1 class="contact-header">Get In Touch</h1>
            <hr>
            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="info-block">
                        <div>
                            <h5>Our Showroom</h5>
                            <p>123 Velocity Blvd, Turbo City, TC 54321</p>
                        </div>
                    </div>
                    <div class="info-block">
                        <div>
                            <h5>Phone Support</h5>
                            <p>+1 (555) 867-5309</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="info-block">
                        <div>
                            <h5>Email Us</h5>
                            <p>hello@bestcars-dealership.com</p>
                        </div>
                    </div>
                    <div class="info-block">
                        <div>
                            <h5>Business Hours</h5>
                            <p>Mon - Sat: 9:00 AM - 8:00 PM<br>Sun: Closed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
